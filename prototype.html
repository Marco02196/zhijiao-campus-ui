<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>安全教育平台 - 交互原型</title>
  <style>
    /* ========== CSS 变量 / 主题切换 ========== */
    :root {
      --bg: #F8FAFF;
      --text: #1F2937;
      --text-muted: #94A3B8;
      --primary: #2B7AE8;
      --primary-light: #3B82F6;
      --border: #E2E8F0;
      --card-bg: #fff;
      --shadow: 0 1px 3px rgba(0,0,0,.08);
      --radius: 16px;
      --nav-h: 64px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    /* 低保真线框模式：在 body 上加 class="wireframe" 即可切换 */
    body.wireframe {
      --bg: #fff;
      --text: #000;
      --text-muted: #666;
      --primary: #000;
      --primary-light: #333;
      --border: #000;
      --card-bg: #fff;
      --shadow: none;
    }
    body.wireframe * { border-radius: 0 !important; box-shadow: none !important; }
    body.wireframe .card,
    body.wireframe .banner,
    body.wireframe .btn-primary { border: 2px dashed #000 !important; background: #fff !important; color: #000 !important; }
    body.wireframe img { filter: grayscale(1); opacity: .5; }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", sans-serif;
      background: #1a1a2e;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
    }

    /* ========== 布局容器：PC 居中模拟手机，移动端全宽 ========== */
    .app-shell {
      max-width: 430px;
      margin: 0 auto;
      height: 100dvh;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }
    @media (min-width: 768px) {
      body { display: flex; align-items: center; justify-content: center; padding: 20px; }
      .app-shell { height: min(900px, 95dvh); border-radius: 24px; box-shadow: 0 25px 80px rgba(0,0,0,.4); }
      .pc-hint { display: block; }
    }
    .pc-hint {
      display: none;
      position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
      font-size: 12px; color: rgba(255,255,255,.5); z-index: 0;
    }

    /* ========== 主内容滚动区 ========== */
    .main-content { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .main-content::-webkit-scrollbar { display: none; }

    /* ========== 通用组件样式 ========== */
    .page { display: none; min-height: 100%; padding-bottom: 16px; }
    .page.active { display: block; }
    .header-tech { background: linear-gradient(135deg, #EBF2FF, #F0F7FF); padding: 20px 16px 12px; }
    .header-dark { background: linear-gradient(135deg, #0F2D52, #1A4B8C, #2563EB); padding: 20px 16px 32px; position: relative; overflow: hidden; }
    .card { background: var(--card-bg); border-radius: var(--radius); border: 1px solid rgba(226,232,240,.6); box-shadow: var(--shadow); }
    .section-title { font-size: 16px; font-weight: 700; color: var(--text); }
    .text-muted { color: var(--text-muted); }
    .btn { border: none; cursor: pointer; font-family: inherit; transition: transform .15s, opacity .15s; }
    .btn:active { transform: scale(.95); }
    .btn-primary { background: linear-gradient(90deg, var(--primary), var(--primary-light)); color: #fff; border-radius: 12px; font-weight: 700; }
    .btn-ghost { background: rgba(43,122,232,.08); color: var(--primary); border-radius: 20px; font-size: 12px; font-weight: 600; padding: 4px 10px; }
    .btn-icon { width: 36px; height: 36px; border-radius: 50%; background: #fff; box-shadow: var(--shadow); display: flex; align-items: center; justify-content: center; border: none; cursor: pointer; }
    .icon { width: 18px; height: 18px; flex-shrink: 0; }
    .icon-sm { width: 14px; height: 14px; }
    .icon-lg { width: 24px; height: 24px; }
    .flex { display: flex; }
    .flex-col { flex-direction: column; }
    .items-center { align-items: center; }
    .justify-between { justify-content: space-between; }
    .gap-2 { gap: 8px; }
    .gap-3 { gap: 12px; }
    .flex-1 { flex: 1; min-width: 0; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .px-4 { padding-left: 16px; padding-right: 16px; }
    .py-3 { padding-top: 12px; padding-bottom: 12px; }
    .mb-3 { margin-bottom: 12px; }
    .mt-3 { margin-top: 12px; }
    .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .progress-bar { height: 8px; background: #F1F5F9; border-radius: 99px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 99px; transition: width .7s; }
    @keyframes fadeInUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
    .fade-in { animation: fadeInUp .45s ease-out; }

    /* ========== Tab 切换器 ========== */
    .tab-switcher { display: flex; padding: 4px; gap: 4px; }
    .tab-switcher .tab-btn { flex: 1; padding: 10px; border-radius: 12px; border: none; background: transparent; font-size: 14px; font-weight: 700; color: var(--text-muted); cursor: pointer; transition: all .3s; }
    .tab-switcher .tab-btn.active { background: linear-gradient(90deg, var(--primary), var(--primary-light)); color: #fff; box-shadow: 0 2px 8px rgba(43,122,232,.3); }

    /* ========== 底部导航 ========== */
    .bottom-nav { height: var(--nav-h); background: rgba(255,255,255,.95); backdrop-filter: blur(12px); border-top: 1px solid rgba(226,232,240,.6); display: flex; align-items: center; justify-content: space-around; padding-bottom: var(--safe-bottom); flex-shrink: 0; z-index: 50; }
    .bottom-nav.hidden { display: none; }
    .nav-item { display: flex; flex-direction: column; align-items: center; gap: 2px; background: none; border: none; cursor: pointer; width: 80px; padding: 4px 0; color: var(--text-muted); transition: color .3s; }
    .nav-item.active { color: var(--primary); }
    .nav-icon-wrap { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; transition: all .3s; }
    .nav-item.active .nav-icon-wrap { background: linear-gradient(135deg, var(--primary), var(--primary-light)); box-shadow: 0 4px 12px rgba(43,122,232,.25); }
    .nav-item.active .nav-icon-wrap svg { stroke: #fff; }
    .nav-label { font-size: 10px; font-weight: 700; }

    /* ========== Banner ========== */
    .banner { border-radius: var(--radius); overflow: hidden; position: relative; aspect-ratio: 16/7; box-shadow: 0 8px 24px rgba(0,0,0,.15); }
    .banner-bg { position: absolute; inset: 0; background: linear-gradient(135deg, #0F2D52, #1A4B8C, #2563EB); }
    .banner-content { position: absolute; inset: 0; padding: 16px; display: flex; flex-direction: column; justify-content: space-between; }

    /* ========== 安全分类卡片 ========== */
    .cat-btn { padding: 12px; display: flex; flex-direction: column; align-items: center; gap: 8px; border: none; background: var(--card-bg); border-radius: var(--radius); cursor: pointer; border: 1px solid rgba(226,232,240,.6); box-shadow: var(--shadow); }
    .cat-icon { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: #fff; }

    /* ========== 手风琴 ========== */
    .accordion-item { overflow: hidden; margin-bottom: 10px; }
    .accordion-header { width: 100%; padding: 14px; display: flex; align-items: center; gap: 12px; border: none; background: var(--card-bg); cursor: pointer; text-align: left; }
    .accordion-body { display: none; padding: 0 14px 14px; border-top: 1px solid #F1F5F9; }
    .accordion-item.expanded .accordion-body { display: block; }
    .accordion-item.expanded .chevron { transform: rotate(90deg); }
    .chevron { transition: transform .3s; color: #CBD5E1; }

    /* ========== 弹窗 / Toast / Loading ========== */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 200; display: none; align-items: flex-end; justify-content: center; }
    .overlay.show { display: flex; }
    @media (min-width: 768px) { .overlay { align-items: center; } }
    .modal { background: #fff; border-radius: 20px 20px 0 0; width: 100%; max-width: 430px; max-height: 85dvh; overflow-y: auto; transform: translateY(100%); transition: transform .3s; }
    @media (min-width: 768px) { .modal { border-radius: 20px; transform: scale(.9); opacity: 0; } }
    .overlay.show .modal { transform: translateY(0); }
    @media (min-width: 768px) { .overlay.show .modal { transform: scale(1); opacity: 1; } }
    .modal-header { padding: 16px; border-bottom: 1px solid #F1F5F9; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: #fff; z-index: 1; }
    .modal-title { font-size: 16px; font-weight: 700; }
    .modal-close { width: 32px; height: 32px; border-radius: 50%; border: none; background: #F1F5F9; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; }
    .modal-body { padding: 16px; }
    .modal-footer { padding: 16px; border-top: 1px solid #F1F5F9; }

    .toast-wrap { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 300; display: flex; flex-direction: column; gap: 8px; width: min(380px, 90vw); pointer-events: none; }
    .toast { padding: 12px 16px; border-radius: 12px; font-size: 13px; font-weight: 500; color: #fff; animation: fadeInUp .3s; pointer-events: auto; display: flex; align-items: center; gap: 8px; }
    .toast.success { background: #10B981; }
    .toast.error { background: #EF4444; }
    .toast.info { background: var(--primary); }

    .loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,.7); z-index: 250; display: none; align-items: center; justify-content: center; flex-direction: column; gap: 12px; }
    .loading-overlay.show { display: flex; }
    .spinner { width: 40px; height: 40px; border: 3px solid #E2E8F0; border-top-color: var(--primary); border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ========== 表单 ========== */
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 13px; font-weight: 600; color: #475569; margin-bottom: 6px; }
    .form-input { width: 100%; padding: 12px 14px; border: 1px solid var(--border); border-radius: 12px; font-size: 14px; outline: none; transition: border-color .2s; }
    .form-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(43,122,232,.15); }
    .form-input.error { border-color: #EF4444; }
    .form-error { font-size: 12px; color: #EF4444; margin-top: 4px; display: none; }
    .form-error.show { display: block; }
    .form-switch { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #F1F5F9; }
    .switch { width: 48px; height: 28px; background: #CBD5E1; border-radius: 14px; position: relative; cursor: pointer; transition: background .2s; border: none; }
    .switch.on { background: var(--primary); }
    .switch::after { content: ''; position: absolute; width: 22px; height: 22px; background: #fff; border-radius: 50%; top: 3px; left: 3px; transition: transform .2s; box-shadow: 0 1px 3px rgba(0,0,0,.2); }
    .switch.on::after { transform: translateX(20px); }

    /* ========== 风格切换浮钮 ========== */
    .style-toggle { position: fixed; bottom: 80px; right: max(16px, calc(50% - 215px + 16px)); z-index: 100; width: 44px; height: 44px; border-radius: 50%; background: #1F2937; color: #fff; border: none; cursor: pointer; font-size: 11px; font-weight: 700; box-shadow: 0 4px 12px rgba(0,0,0,.3); }
    @media (min-width: 768px) { .style-toggle { right: calc(50% - 215px + 16px); bottom: calc(50% - 450px + 80px); } }

    /* ========== 子页面（全屏） ========== */
    .sub-page { position: absolute; inset: 0; background: var(--bg); z-index: 60; display: none; flex-direction: column; }
    .sub-page.show { display: flex; }
    .sub-page-header { padding: 12px 16px; display: flex; align-items: center; gap: 12px; background: linear-gradient(135deg, #EBF2FF, #F0F7FF); flex-shrink: 0; }
    .sub-page-body { flex: 1; overflow-y: auto; padding: 16px; }

    /* ========== 菜单列表 ========== */
    .menu-item { width: 100%; padding: 14px 16px; display: flex; align-items: center; gap: 12px; border: none; background: none; cursor: pointer; text-align: left; border-bottom: 1px solid #F1F5F9; }
    .menu-item:active { background: var(--bg); }
    .menu-icon { width: 36px; height: 36px; border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

    /* ========== 统计卡片 ========== */
    .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; padding: 16px; }
    .stat-item { display: flex; flex-direction: column; align-items: center; gap: 6px; text-align: center; }
    .stat-icon { width: 36px; height: 36px; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: #fff; }

    /* ========== 反诈专题 ========== */
    .anti-fraud { border: 1px solid #FEE2E2; border-radius: 12px; overflow: hidden; margin-top: 16px; background: linear-gradient(135deg, #FEF2F2, #fff); }
    .anti-fraud-header { padding: 12px 14px; background: linear-gradient(90deg, #DC2626, #EF4444); display: flex; align-items: center; gap: 10px; color: #fff; }
  </style>
</head>

  <p class="pc-hint">PC 预览模式 · 居中模拟移动端 430px 宽度</p>

  <!-- Toast 消息容器 -->
  <div class="toast-wrap" id="toastWrap"></div>
  <!-- 全局 Loading -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <span class="text-muted" id="loadingText">加载中...</span>
  </div>

  <div class="app-shell" id="appShell">
    <main class="main-content" id="mainContent">

    </main>
    <nav class="bottom-nav" id="bottomNav"></nav>
  </div>

  <!-- 通用弹窗 -->
  <div class="overlay" id="modalOverlay" onclick="App.handleOverlayClick(event)">

        <span class="modal-title" id="modalTitle"></span>

// ========== 模拟 API（可调整 delay / failRate） ==========
const MockAPI = {
  delay: 800,       // 模拟网络延迟 ms
  failRate: 0.1,    // 10% 概率失败，设为 0 关闭随机错误

  async request(action, payload = {}) {
    await new Promise(r => setTimeout(r, this.delay));
    if (Math.random() < this.failRate) throw new Error('网络请求失败，请稍后重试');
    switch (action) {
      case 'downloadMaterial': return { success: true, filename: payload.name + '.pdf' };
      case 'startCourse': return { success: true, courseId: payload.courseName };
      case 'completeCourse': return { success: true, medal: payload.medal || null };
      case 'changePassword': return { success: true };
      case 'saveSettings': return { success: true };
      case 'markNewsRead': return { success: true };
      default: return { success: true };
    }
  }
};

// ========== 工具函数 ==========
function $(sel) { return document.querySelector(sel); }
function $$(sel) { return document.querySelectorAll(sel); }
function icon(name) { return Icons[name] || ''; }
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function showToast(msg, type = 'info') {
  const wrap = $('#toastWrap');
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity .3s'; setTimeout(() => el.remove(), 300); }, 2800);
}

function showLoading(text = '加载中...') {
  $('#loadingText').textContent = text;
  $('#loadingOverlay').classList.add('show');
}
function hideLoading() { $('#loadingOverlay').classList.remove('show'); }

    DATA.newsItems.forEach((n, i) => { state.newsRead[i] = n.read; });

          <div style="padding:12px 14px">${t.subCategory.courses.map(c => this.renderCourseRow(c, true)).join('')}</div>
        </div>` : '';
      const medals = t.medals.map(m => `<span style="display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:8px;background:#FEF3C7;font-size:10px;font-weight:700;color:#92400E;margin-right:6px;margin-top:8px">${Icons.award} ${m}</span>`).join('');
      return `<div class="card accordion-item${expanded?' expanded':''}" data-topic="${t.id}">
        <button class="accordion-header">
          <div style="width:44px;height:44px;border-radius:12px;background:${t.color};display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0">${icon(t.icon)}</div>
          <div class="flex-1">
            <div class="flex justify-between"><span style="font-size:14px;font-weight:700">${t.title}</span><span class="text-muted" style="font-size:10px;font-weight:700">${tc}/${t.courses.length}</span></div>
            <div class="progress-bar mt-3" style="height:6px;margin-top:6px"><div class="progress-fill" style="width:${tc/t.courses.length*100}%;background:${t.color}"></div></div>
          </div>
          <span class="chevron">${Icons.chevronR}</span>
        </button>
        <div class="accordion-body">
          <p class="text-muted" style="font-size:12px;line-height:1.6;padding:10px 0">${t.desc}</p>
          ${courseList}
          ${sub}
          <div style="margin-top:8px;padding-top:8px;border-top:1px solid #F1F5F9">${medals}</div>
        </div>
      </div>`;
    }).join('');
    const allMedals = topics.flatMap(t => t.medals).map(m => `<span style="display:inline-flex;align-items:center;gap:4px;padding:6px 12px;border-radius:12px;background:linear-gradient(90deg,#FEF3C7,#FDE68A);font-size:12px;font-weight:700;color:#92400E;margin:4px">${Icons.award} ${m}</span>`).join('');
    return `<div class="page active fade-in">
      <header class="header-tech flex items-center gap-3" style="padding:14px 16px">
        <button class="btn-icon" id="btnBack">${Icons.chevronR.replace('points="9 18 15 12 9 6"','points="19 12 5 12 12 19 5 7"')}</button>
        <div class="flex-1">
          <h1 style="font-size:18px;font-weight:700">校园安全教育</h1>
          <p class="text-muted" style="font-size:10px">共 ${topics.length} 个安全主题 · ${total} 门课程</p>
        </div>
      </header>
      <div class="px-4" style="padding-top:16px;padding-bottom:24px">
        <div class="card flex items-center gap-4 mb-3" style="padding:16px">
          <div style="width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,#2B7AE8,#3B82F6);display:flex;align-items:center;justify-content:center;color:#fff">${Icons.shield.replace('class="icon"','class="icon-lg"')}</div>
          <div class="flex-1">
            <div class="flex justify-between mb-2"><span style="font-size:14px;font-weight:700">总体学习进度</span><span style="font-size:14px;font-weight:700;color:#2B7AE8">${pct}%</span></div>
            <div class="progress-bar" style="height:10px"><div class="progress-fill" style="width:${pct}%;background:linear-gradient(90deg,#2B7AE8,#10B981)"></div></div>
            <div class="text-muted" style="font-size:11px;margin-top:6px">已完成 ${done}/${total} 门课程</div>
          </div>
        </div>
        ${accordion}
        <div class="card mt-3" style="padding:16px;margin-top:16px">
          <h3 style="font-size:14px;font-weight:700;margin-bottom:12px">可获得勋章</h3>
          <div style="display:flex;flex-wrap:wrap">${allMedals}</div>
        </div>
      </div>
    </div>`;
  },

  renderCourseRow(c, isAntiFraud) {
    const done = state.courseProgress[c.name];
    const btnStyle = isAntiFraud ? 'background:linear-gradient(90deg,#DC2626,#EF4444)' : '';
    return `<div class="flex items-center gap-2" style="padding:6px 0">
      <div style="width:28px;height:28px;border-radius:50%;background:${done?'#ECFDF5':'#F8FAFF'};display:flex;align-items:center;justify-content:center">${done ? Icons.check : Icons.book.replace('stroke="currentColor"','stroke="#CBD5E1"')}</div>
      <span class="flex-1" style="font-size:12px;color:${done?'#10B981':'#475569'};font-weight:${done?'500':'400'}">${esc(c.name)}</span>
      <span class="text-muted flex items-center gap-1" style="font-size:10px">${Icons.clock} ${c.duration}</span>
      ${done ? '' : `<button class="btn btn-primary learn-btn" data-course="${esc(c.name)}" style="padding:4px 10px;font-size:10px;${btnStyle}">学习</button>`}
    </div>`;
  },

  bindSafetyDetailEvents() {
    $('#btnBack').onclick = () => this.navigate('home');
    $$('.accordion-item .accordion-header').forEach(btn => {
      btn.onclick = () => {
        const id = btn.closest('.accordion-item').dataset.topic;
        state.expandedTopic = state.expandedTopic === id ? null : id;
        this.renderMain();
      };
    });
    $$('.learn-btn').forEach(btn => btn.onclick = () => this.handleLearnCourse(btn.dataset.course));
  },

  // ---------- 个人中心 ----------
  renderProfile() {
    const s = DATA.student;
    const stats = [
      { label:'学习天数', value:'128', color:'linear-gradient(135deg,#2563EB,#3B82F6)' },
      { label:'已通过考试', value:'12', color:'linear-gradient(135deg,#10B981,#5AD8A2)' },
      { label:'获得证书', value:'5', color:'linear-gradient(135deg,#F59E0B,#FFB366)' },
      { label:'学习时长', value:'86h', color:'linear-gradient(135deg,#9333EA,#A855F7)' },
    ];
    const statHtml = stats.map(st => `
      <div class="stat-item">
        <div class="stat-icon" style="background:${st.color}">${Icons.clock.replace('stroke="currentColor"','stroke="#fff"')}</div>
        <span style="font-size:16px;font-weight:700">${st.value}</span>
        <span class="text-muted" style="font-size:10px">${st.label}</span>
      </div>`).join('');
    const menu = DATA.profileMenu.map(m => `
      <button class="menu-item" data-menu="${m.id}">
        <div class="menu-icon" style="background:${m.color}15;color:${m.color}">${Icons.book.replace('stroke="currentColor"','stroke="'+m.color+'"')}</div>
        <div class="flex-1"><div style="font-size:14px;font-weight:600">${m.label}</div><div class="text-muted" style="font-size:11px;margin-top:2px">${m.desc}</div></div>
        ${Icons.chevronR.replace('stroke="currentColor"','stroke="#CBD5E1"')}
      </button>`).join('');
    return `<div class="page active fade-in">
      <header class="header-dark">
        <h1 style="color:#fff;font-size:18px;font-weight:700;margin-bottom:16px">个人中心</h1>
        <div class="flex items-center gap-4">
          <div style="width:64px;height:64px;border-radius:16px;border:2px solid rgba(255,255,255,.3);background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.8)">${Icons.user.replace('class="icon"','class="icon-lg"')}</div>
          <div class="flex-1">
            <h2 style="color:#fff;font-size:18px;font-weight:700">${s.name}</h2>
            <p style="color:rgba(255,255,255,.6);font-size:12px;margin-top:2px">${s.school}</p>
            <div class="flex gap-2 mt-2">
              <span style="padding:2px 8px;border-radius:6px;background:rgba(255,255,255,.15);color:rgba(255,255,255,.8);font-size:10px">${s.grade}</span>
              <span style="padding:2px 8px;border-radius:6px;background:rgba(255,255,255,.15);color:rgba(255,255,255,.8);font-size:10px">${s.major}</span>
            </div>
          </div>
        </div>
      </header>
      <div style="margin-top:-20px;position:relative;z-index:1" class="px-4">
        <div class="card stat-grid">${statHtml}</div>
      </div>
      <div class="px-4" style="padding-top:20px;padding-bottom:24px">
        <section class="card mb-3" style="overflow:hidden">
          <div style="padding:16px;border-bottom:1px solid #F1F5F9"><h3 style="font-size:14px;font-weight:700">基本信息</h3></div>
          <div style="padding:16px">
            ${[['学号',s.studentId],['班级',s.class],['专业',s.major],['手机号',s.phone]].map(([k,v]) => `
              <div class="flex justify-between" style="margin-bottom:12px"><span class="text-muted" style="font-size:12px">${k}</span><span style="font-size:14px;font-weight:600">${v}</span></div>`).join('')}
          </div>
        </section>
        <section class="card mb-3" style="overflow:hidden">${menu}</section>
        <section>
          <div class="flex items-center gap-2 mb-3">
            <div style="width:24px;height:24px;border-radius:8px;background:linear-gradient(135deg,#2B7AE8,#60A5FA);display:flex;align-items:center;justify-content:center;color:#fff">${Icons.book}</div>
            <h2 class="section-title">学习进度</h2>
          </div>
          <div class="card" style="padding:16px">
            ${[{n:'安全教育',p:75,c:'#2B7AE8'},{n:'技能培训',p:60,c:'#10B981'},{n:'普法课堂',p:45,c:'#F59E0B'}].map(x => `
              <div style="margin-bottom:12px">
                <div class="flex justify-between mb-2"><span style="font-size:12px;font-weight:600;color:#475569">${x.n}</span><span style="font-size:12px;font-weight:700;color:${x.c}">${x.p}%</span></div>
                <div class="progress-bar"><div class="progress-fill" style="width:${x.p}%;background:linear-gradient(90deg,${x.c},${x.c}88)"></div></div>
              </div>`).join('')}
          </div>
        </section>
        <div class="text-muted" style="text-align:center;font-size:10px;padding-top:16px">安全教育平台 v1.0.0</div>
      </div>
    </div>`;
  },

  bindProfileEvents() {
    $$('[data-menu]').forEach(btn => btn.onclick = () => this.handleMenuClick(btn.dataset.menu));
  },

  // ---------- 弹窗管理 ----------
  openModal(title, bodyHtml, footerHtml) {
    $('#modalTitle').textContent = title;
    $('#modalBody').innerHTML = bodyHtml;
    const footer = $('#modalFooter');
    if (footerHtml) { footer.innerHTML = footerHtml; footer.style.display = 'block'; }
    else { footer.style.display = 'none'; }
    $('#modalOverlay').classList.add('show');
  },
  closeModal() { $('#modalOverlay').classList.remove('show'); },
  handleOverlayClick(e) { if (e.target === $('#modalOverlay')) this.closeModal(); },

  // ---------- 子页面（表单类） ----------
  openSubPage(title, bodyHtml) {
    $('#subPageTitle').textContent = title;
    $('#subPageBody').innerHTML = bodyHtml;
    $('#subPage').classList.add('show');
  },
  closeSubPage() { $('#subPage').classList.remove('show'); },

  // ---------- 交互处理 ----------
  showExamRecordsModal() {
    const list = DATA.examRecords.map(r => `
      <div class="flex justify-between items-center" style="padding:12px 0;border-bottom:1px solid #F1F5F9">
        <div><div style="font-size:14px;font-weight:600">${esc(r.name)}</div><div class="text-muted" style="font-size:11px;margin-top:2px">${r.date}</div></div>
        <div style="text-align:right"><div style="font-size:18px;font-weight:700;color:${r.pass?'#10B981':'#EF4444'}">${r.score}分</div><div style="font-size:10px;color:${r.pass?'#10B981':'#EF4444'}">${r.pass?'已通过':'未通过'}</div></div>
      </div>`).join('');
    this.openModal('考试记录', list);
  },

  async handleNewsClick(index) {
    const news = DATA.newsItems[index];
    showLoading('加载案例...');
    try {
      await MockAPI.request('markNewsRead', { index });
      state.newsRead[index] = true;
      hideLoading();
      this.openModal('警示案例', `
        <p style="font-size:14px;line-height:1.7;margin-bottom:12px">${esc(news.title)}</p>
        <p class="text-muted" style="font-size:12px;margin-bottom:16px">发布日期：${news.date}</p>
        <p style="font-size:13px;line-height:1.6;color:#475569">本案为校园安全教育警示案例，旨在提高师生防范意识。详细内容请查看原文。</p>
      `, `<button class="btn btn-primary" style="width:100%;padding:12px" onclick="window.open('${news.link}','_blank');App.closeModal()">查看原文</button>`);
      this.renderMain();
    } catch (e) {
      hideLoading();
      showToast(e.message, 'error');
    }
  },

  showSkillDetailModal(index) {
    const c = DATA.skillCourses[index];
    this.openModal(c.name, `
      <div style="width:100%;height:120px;border-radius:12px;background:linear-gradient(135deg,#E2E8F0,#CBD5E1);margin-bottom:16px"></div>
      <div class="flex gap-2 mb-3"><span style="padding:4px 10px;border-radius:6px;font-size:11px;font-weight:700;color:#fff;background:#2B7AE8">${c.category}</span><span class="text-muted" style="font-size:12px">${c.size}</span></div>
      <p class="text-muted" style="font-size:13px;line-height:1.6;margin-bottom:12px">已有 ${c.downloads.toLocaleString()} 人学习本课程。课程包含视频讲解、实操练习和模拟考试。</p>
    `, `<button class="btn btn-primary" style="width:100%;padding:12px" onclick="App.handleEnrollSkill(${index})">立即报名</button>`);
  },

  async handleEnrollSkill(index) {
    this.closeModal();
    showLoading('提交报名...');
    try {
      await MockAPI.request('startCourse', { courseName: DATA.skillCourses[index].name });
      hideLoading();
      showToast('报名成功！', 'success');
    } catch (e) {
      hideLoading();
      showToast(e.message, 'error');
    }
  },

  async handleDownload(index) {
    const m = DATA.studyMaterials[index];
    showLoading('下载中...');
    try {
      const res = await MockAPI.request('downloadMaterial', { name: m.name });
      hideLoading();
      showToast(res.filename + ' 下载完成', 'success');
    } catch (e) {
      hideLoading();
      showToast(e.message, 'error');
    }
  },

  async handleLearnCourse(courseName) {
    showLoading('加载课程...');
    try {
      await MockAPI.request('startCourse', { courseName });
      hideLoading();
      this.openModal('课程学习', `
        <h3 style="font-size:16px;font-weight:700;margin-bottom:8px">${esc(courseName)}</h3>
        <p class="text-muted" style="font-size:13px;margin-bottom:16px">请认真观看以下学习内容（模拟播放器）</p>
        <div style="width:100%;aspect-ratio:16/9;background:#1F2937;border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff;margin-bottom:16px">
          <div style="text-align:center"><div style="font-size:32px;margin-bottom:8px">▶</div><div style="font-size:12px;opacity:.7">视频播放中...</div></div>
        </div>
      `, `<button class="btn btn-primary" style="width:100%;padding:12px" onclick="App.completeCourse('${courseName.replace(/'/g,"\\'")}')">完成学习</button>`);
    } catch (e) {
      hideLoading();
      showToast(e.message, 'error');
    }
  },

  async completeCourse(courseName) {
    this.closeModal();
    showLoading('保存进度...');
    try {
      await MockAPI.request('completeCourse', { courseName });
      state.courseProgress[courseName] = true;
      hideLoading();
      showToast('课程学习完成！', 'success');
      if (state.currentPage === 'safetyDetail') this.renderMain();
    } catch (e) {
      hideLoading();
      showToast(e.message, 'error');
    }
  },

  handleMenuClick(id) {
    const handlers = {
      records: () => this.openModal('学习记录', DATA.examRecords.map(r =>
        `<div style="padding:10px 0;border-bottom:1px solid #F1F5F9;font-size:13px">${Icons.book} ${esc(r.name)} <span class="text-muted">· ${r.date}</span></div>`).join('')),
      certs: () => this.openModal('我的证书', DATA.certificates.map(c =>
        `<div class="flex justify-between items-center" style="padding:12px 0;border-bottom:1px solid #F1F5F9">
          <span style="font-size:14px">${Icons.award} ${esc(c)}</span>
          <button class="btn btn-ghost" onclick="showToast('证书下载中...','info')">下载</button>
        </div>`).join('')),
      exams: () => this.openModal('考试安排', DATA.upcomingExams.map(e =>
        `<div style="padding:12px;background:#F8FAFF;border-radius:12px;margin-bottom:8px">
          <div style="font-size:14px;font-weight:600">${esc(e.name)}</div>
          <div class="text-muted" style="font-size:12px;margin-top:4px">${e.date} · ${e.topic}</div>
        </div>`).join('')),
      favorites: () => this.openModal('我的收藏', '<p class="text-muted" style="text-align:center;padding:24px">暂无收藏内容</p>'),
      notifications: () => this.openModal('消息通知', [
        { t:'系统通知', m:'您有一门考试即将开始', d:'今天' },
        { t:'学习提醒', m:'今日还未完成安全学习', d:'2小时前' },
      ].map(n => `<div style="padding:12px 0;border-bottom:1px solid #F1F5F9"><div style="font-size:11px;color:#2B7AE8;font-weight:600">${n.t}</div><div style="font-size:14px;margin-top:4px">${n.m}</div><div class="text-muted" style="font-size:11px;margin-top:2px">${n.d}</div></div>`).join('')),
      security: () => this.openSecurityPage(),
      settings: () => this.openSettingsPage(),
      help: () => this.openModal('帮助中心', DATA.faq.map(f =>
        `<details style="margin-bottom:12px;border:1px solid #F1F5F9;border-radius:12px;padding:12px"><summary style="font-size:14px;font-weight:600;cursor:pointer">${esc(f.q)}</summary><p class="text-muted" style="font-size:13px;margin-top:8px;line-height:1.6">${esc(f.a)}</p></details>`).join('')),
    };
    (handlers[id] || (() => showToast('功能开发中', 'info')))();
  },

  // ---------- 账号安全表单（含校验） ----------
  openSecurityPage() {
    this.openSubPage('账号安全', `
      <form id="securityForm" onsubmit="App.submitSecurityForm(event)">
        <div class="form-group">
          <label class="form-label">当前密码</label>
          <input class="form-input" type="password" id="oldPwd" placeholder="请输入当前密码" />
          <div class="form-error" id="errOldPwd">请输入当前密码</div>
        </div>
        <div class="form-group">
          <label class="form-label">新密码</label>
          <input class="form-input" type="password" id="newPwd" placeholder="至少6位，含字母和数字" />
          <div class="form-error" id="errNewPwd">密码至少6位，需包含字母和数字</div>
        </div>
        <div class="form-group">
          <label class="form-label">确认新密码</label>
          <input class="form-input" type="password" id="confirmPwd" placeholder="再次输入新密码" />
          <div class="form-error" id="errConfirmPwd">两次密码输入不一致</div>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;padding:14px;margin-top:8px">确认修改</button>
      </form>`);
  },

  validateSecurityForm() {
    const oldPwd = $('#oldPwd').value.trim();
    const newPwd = $('#newPwd').value.trim();
    const confirmPwd = $('#confirmPwd').value.trim();
    let valid = true;
    const show = (id, show) => { const el = $('#'+id); el.classList.toggle('show', show); $('#'+id.replace('err','').replace('Pwd','Pwd')||''); };
    const setErr = (inputId, errId, condition, msg) => {
      const input = $('#'+inputId);
      const err = $('#'+errId);
      if (condition) { input.classList.add('error'); err.textContent = msg; err.classList.add('show'); valid = false; }
      else { input.classList.remove('error'); err.classList.remove('show'); }
    };
    setErr('oldPwd','errOldPwd', !oldPwd, '请输入当前密码');
    setErr('newPwd','errNewPwd', !/^(?=.*[A-Za-z])(?=.*\d).{6,}$/.test(newPwd), '密码至少6位，需包含字母和数字');
    setErr('confirmPwd','errConfirmPwd', newPwd !== confirmPwd, '两次密码输入不一致');
    return valid;
  },

  async submitSecurityForm(e) {
    e.preventDefault();
    if (!this.validateSecurityForm()) return;
    showLoading('提交中...');
    try {
      await MockAPI.request('changePassword');
      hideLoading();
      this.closeSubPage();
      showToast('密码修改成功', 'success');
    } catch (err) {
      hideLoading();
      showToast(err.message, 'error');
    }
  },

  // ---------- 系统设置 ----------
  openSettingsPage() {
    const s = state.settings;
    this.openSubPage('系统设置', `
      <div class="card" style="padding:0 16px;margin-bottom:16px">
        <div class="form-switch"><span style="font-size:14px">每日学习提醒</span><button class="switch${s.dailyReminder?' on':''}" data-key="dailyReminder" onclick="App.toggleSetting(this)"></button></div>
        <div class="form-switch"><span style="font-size:14px">推送通知</span><button class="switch${s.pushNotify?' on':''}" data-key="pushNotify" onclick="App.toggleSetting(this)"></button></div>
        <div class="form-switch"><span style="font-size:14px">仅 WiFi 下载</span><button class="switch${s.wifiOnly?' on':''}" data-key="wifiOnly" onclick="App.toggleSetting(this)"></button></div>
      </div>
      <button class="btn btn-primary" style="width:100%;padding:14px" onclick="App.saveSettings()">保存设置</button>`);
  },

  toggleSetting(btn) {
    const key = btn.dataset.key;
    state.settings[key] = !state.settings[key];
    btn.classList.toggle('on', state.settings[key]);
  },

  async saveSettings() {
    showLoading('保存中...');
    try {
      await MockAPI.request('saveSettings', state.settings);
      hideLoading();
      this.closeSubPage();
      showToast('设置已保存', 'success');
    } catch (e) {
      hideLoading();
      showToast(e.message, 'error');
    }
  },
};

// 启动应用
document.addEventListener('DOMContentLoaded', () => App.init());
</script>
</body>
</html>
